kind = "web"
previewPath = "/"
title = "LLMeter"
version = "1.0.0"
id = "artifacts/llmeter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19690

[services.development]
run = "pnpm --filter @workspace/llmeter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/llmeter", "run", "build" ]
publicDir = "artifacts/llmeter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19690"
BASE_PATH = "/"
